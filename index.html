<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>LabSketch Didacticae</title>

  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/sidebar.css" />
  <link rel="stylesheet" href="css/toolbar.css" />
  <link rel="stylesheet" href="css/canvas.css" />
</head>
<body>

  <nav class="topnav">
      <h1>LabSketch</h1>
    <p class="subtitle">Didacticae</p>
  </nav>

  <aside class="sidebar">
    <div id="toolList" class="tool-list"></div>
    <!-- <button class="tool" data-object="label">Beschriftung</button> -->
    
  </aside>

  <main class="workspace">

    <div class="toolbar">
      <button id="smallerBtn">− kleiner</button>
      <button id="biggerBtn">+ größer</button>
      <button id="rotateLeftBtn">↺ drehen</button>
      <button id="rotateRightBtn">↻ drehen</button>
      <button id="duplicateBtn">⧉ duplizieren</button>
      <button id="frontBtn">nach vorne</button>
      <button id="backBtn">nach hinten</button>
      <button id="exportSvgBtn">SVG exportieren</button>
      <button id="exportPngBtn">PNG exportieren</button>
      <button id="saveProjectBtn">Projekt speichern</button>
      <button id="loadProjectBtn">Projekt laden</button>
      <input id="loadProjectInput" type="file" accept=".json" hidden>
      <button id="toggleGridBtn">Raster an/aus</button>
      <button id="toggleSnapBtn">Snap an/aus</button>
    </div>

    <div class="properties-panel">
  <label>
    X
    <input id="posXInput" type="number">
  </label>

  <label>
    Y
    <input id="posYInput" type="number">
  </label>

  <label>
    Größe
    <input id="scaleInput" type="number" step="0.1" min="0.1">
  </label>

  <label>
    Rotation
    <input id="rotationInput" type="number">
  </label>

  <label id="textProperty">
    Text
    <input id="textInput" type="text">
  </label>
</div>

<svg id="canvas" viewBox="0 0 1000 700">
  <rect id="background" width="1000" height="700" fill="#ffffff" />

  <defs>
    <pattern id="gridPattern" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25"
            fill="none"
            stroke="#d8cfaF"
            stroke-width="1" />
    </pattern>
  </defs>

  <rect id="grid" width="1000" height="700" fill="url(#gridPattern)" opacity="0.45" />
</svg>

  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
