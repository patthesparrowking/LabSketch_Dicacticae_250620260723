<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>LabSketch Didacticae</title>

  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/panels.css" />
  <link rel="stylesheet" href="css/buttons.css" />
  <link rel="stylesheet" href="css/canvas.css" />
  <link rel="stylesheet" href="css/pocket.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>

<body>
  <div class="app-shell">

    <header class="topbar">
      <div class="brand">
        <span class="brand-title">LabSketch</span>
        <span class="brand-subtitle">Didacticae</span>
      </div>

      <div class="topbar-actions">
        <button id="saveProjectBtn" class="btn">Speichern</button>
        <button id="loadProjectBtn" class="btn">Laden</button>
        <button id="exportSvgBtn" class="btn">SVG</button>
        <button id="exportPngBtn" class="btn primary">PNG</button>
        <input id="loadProjectInput" type="file" accept=".json" hidden>
      </div>
    </header>

    <main class="main-layout">

      <aside class="asset-panel">
        <div class="sheet-header">
          <span class="sheet-handle"></span>
          <button class="sheet-close" data-close-sheet>×</button>
        </div>

        <div class="panel-header">
          <h2>Objekte</h2>
          <p>Stationen, Geräte und Symbole</p>
        </div>

        <div class="asset-search">
          <input id="assetSearchInput" type="search" placeholder="Objekte suchen …">
        </div>

        <div id="toolList" class="tool-list"></div>
      </aside>

      <section class="canvas-area">
        <div class="desktop-toolbar">
          <button id="undoBtn" class="icon-btn" title="Rückgängig">↶</button>
          <button id="redoBtn" class="icon-btn" title="Wiederholen">↷</button>
          <button id="smallerBtn" class="icon-btn" title="Kleiner">−</button>
          <button id="biggerBtn" class="icon-btn" title="Größer">+</button>
          <button id="rotateLeftBtn" class="icon-btn" title="Links drehen">↺</button>
          <button id="rotateRightBtn" class="icon-btn" title="Rechts drehen">↻</button>
          <button id="duplicateBtn" class="icon-btn" title="Duplizieren">⧉</button>
          <button id="deleteBtn" class="icon-btn danger" title="Löschen">⌫</button>
          <button id="lockBtn" class="icon-btn" title="Sperren">🔒</button>
          <button id="visibilityBtn" class="icon-btn" title="Sichtbarkeit">👁</button>
          <button id="frontBtn" class="icon-btn" title="Nach vorne">⬆</button>
          <button id="backBtn" class="icon-btn" title="Nach hinten">⬇</button>
          <button id="toggleGridBtn" class="icon-btn is-active" title="Raster">▦</button>
          <button id="toggleSnapBtn" class="icon-btn is-active" title="Snap">⌗</button>
          <button id="alignLeftBtn" class="icon-btn" title="Links ausrichten">⟸</button>
        <button id="alignCenterXBtn" class="icon-btn" title="Horizontal zentrieren">↔</button>
        <button id="alignRightBtn" class="icon-btn" title="Rechts ausrichten">⟹</button>
        <button id="alignTopBtn" class="icon-btn" title="Oben ausrichten">⇑</button>
        <button id="alignCenterYBtn" class="icon-btn" title="Vertikal zentrieren">↕</button>
        <button id="alignBottomBtn" class="icon-btn" title="Unten ausrichten">⇓</button>
        </div>

        <div class="pocket-canvas-toolbar">
          <button id="mobileUndoBtn" class="icon-btn" title="Rückgängig">↶</button>
          <button id="mobileRedoBtn" class="icon-btn" title="Wiederholen">↷</button>
          <button id="mobileDuplicateBtn" class="icon-btn" title="Duplizieren">⧉</button>
          <button id="mobileDeleteBtn" class="icon-btn danger" title="Löschen">⌫</button>
        </div>

        <div class="canvas-wrapper">
          <svg id="canvas" viewBox="0 0 1000 700">
            <defs>
              <pattern id="gridPattern" width="25" height="25" patternUnits="userSpaceOnUse">
                <path d="M 25 0 L 0 0 0 25"
                      fill="none"
                      stroke="#d8cfaf"
                      stroke-width="1" />
              </pattern>
            </defs>

            <rect id="background" width="1000" height="700" fill="#ffffff" />
            <rect id="grid" width="1000" height="700" fill="url(#gridPattern)" opacity="0.45" />
          </svg>
        </div>

        <div class="statusbar">
          <span id="selectedStatus">Ausgewählt: nichts</span>
          <span id="gridStatus">Raster: an</span>
          <span id="snapStatus">Snap: an</span>
        </div>
      </section>

      <aside class="properties-panel">
        <div class="sheet-header">
          <span class="sheet-handle"></span>
          <button class="sheet-close" data-close-sheet>×</button>
        </div>

        <div class="panel-header">
          <h2>Bearbeiten</h2>
          <p>Ausgewähltes Objekt</p>
        </div>

        <div class="mobile-edit-actions">
          <button id="mobileSmallerBtn" class="icon-btn" title="Kleiner">−</button>
          <button id="mobileBiggerBtn" class="icon-btn" title="Größer">+</button>
          <button id="mobileRotateLeftBtn" class="icon-btn" title="Links drehen">↺</button>
          <button id="mobileRotateRightBtn" class="icon-btn" title="Rechts drehen">↻</button>
          <button id="mobileLockBtn" class="icon-btn" title="Sperren">🔒</button>
          <button id="mobileVisibilityBtn" class="icon-btn" title="Ausblenden">👁</button>
        </div>

        <div class="property-grid">
          <label>
            Name
            <input id="nameInput" type="text">
          </label>

          <label>
            X
            <input id="posXInput" type="number">
          </label>

          <label>
            Y
            <input id="posYInput" type="number">
          </label>

          <label>
            Größe
            <input id="scaleInput" type="number" step="0.1" min="0.1">
          </label>

          <label>
            Rotation
            <input id="rotationInput" type="number">
          </label>

          <label id="textProperty" class="full">
            Text
            <input id="textInput" type="text">
          </label>
        </div>

        <div class="layers-panel" id="layersPanel">
          <h3>Ebenen</h3>
          <div id="layersList" class="layers-list"></div>
        </div>
      </aside>

      <aside id="pocketMoreSheet" class="pocket-sheet">
        <div class="sheet-header">
          <span class="sheet-handle"></span>
          <button class="sheet-close" data-close-sheet>×</button>
        </div>

        <div class="panel-header">
          <h2>Mehr</h2>
          <p>Projekt, Export und Ansicht</p>
        </div>

        <div class="pocket-more-grid">
          <button id="mobileSaveProjectBtn" class="icon-btn" title="Projekt speichern">💾</button>
          <button id="mobileLoadProjectBtn" class="icon-btn" title="Projekt laden">📂</button>
          <button id="mobileExportSvgBtn" class="icon-btn" title="SVG exportieren">SVG</button>
          <button id="mobileExportPngBtn" class="icon-btn primary" title="PNG exportieren">PNG</button>
          <button id="mobileGridBtn" class="icon-btn is-active" title="Raster">▦</button>
          <button id="mobileSnapBtn" class="icon-btn is-active" title="Snap">⌗</button>
          <button id="mobileAlignCenterXBtn" class="icon-btn" title="Horizontal zentrieren">↔</button>
          <button id="mobileAlignCenterYBtn" class="icon-btn" title="Vertikal zentrieren">↕</button>
        </div>
      </aside>

    </main>

    <nav class="pocket-dock">
      <button data-pocket-panel="assets" title="Objekte" aria-label="Objekte">◫</button>
      <button data-pocket-panel="edit" title="Bearbeiten" aria-label="Bearbeiten">✦</button>
      <button data-pocket-panel="layers" title="Ebenen" aria-label="Ebenen">▤</button>
      <button data-pocket-panel="more" title="Mehr" aria-label="Mehr">•••</button>
    </nav>

    <div id="pocketOverlay" class="pocket-overlay"></div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
