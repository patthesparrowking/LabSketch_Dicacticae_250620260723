<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>LabSketch Didacticae</title>

  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/panels.css" />
  <link rel="stylesheet" href="css/buttons.css" />
  <link rel="stylesheet" href="css/canvas.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>

<body>
  <div class="app-shell">

    <header class="topbar">
      <div class="brand">
        <span class="brand-title">LabSketch</span>
        <span class="brand-subtitle">Didacticae</span>
      </div>

<div class="topbar-actions">
  <button id="toggleAssetsBtn" class="btn">Objekte</button>
  <button id="togglePropertiesBtn" class="btn">Eigenschaften</button>

  <button id="saveProjectBtn" class="btn">Projekt speichern</button>
  <button id="loadProjectBtn" class="btn">Projekt laden</button>
  <button id="exportSvgBtn" class="btn">SVG</button>
  <button id="exportPngBtn" class="btn primary">PNG</button>
  <input id="loadProjectInput" type="file" accept=".json" hidden>
</div>
    </header>

    <main class="main-layout">

      <aside class="asset-panel">
        <div class="sheet-header">
  <span class="sheet-handle"></span>
  <button class="sheet-close" data-close-sheet>×</button>
</div>
        <div class="panel-header">
          <h2>Objekte</h2>
          <p>Laborgeräte, Stationen und Symbole</p>
        </div>

        <div class="asset-search">
            <input id="assetSearchInput" type="search" placeholder="Objekte suchen …">
        </div>

        <div id="toolList" class="tool-list"></div>
      </aside>

      <section class="canvas-area">
        <div class="canvas-toolbar">
          <button id="smallerBtn" class="icon-btn">−</button>
          <button id="biggerBtn" class="icon-btn">+</button>
          <button id="rotateLeftBtn" class="icon-btn">↺</button>
          <button id="rotateRightBtn" class="icon-btn">↻</button>
          <button id="duplicateBtn" class="btn">Duplizieren</button>
          <button id="frontBtn" class="btn">Nach vorne</button>
          <button id="backBtn" class="btn">Nach hinten</button>
          <button id="toggleGridBtn" class="btn">Raster</button>
          <button id="toggleSnapBtn" class="btn">Snap</button>
          <button id="undoBtn" class="btn">↶ Rückgängig</button>
<button id="redoBtn" class="btn">↷ Wiederholen</button>
<button id="lockBtn" class="btn">Sperren</button>
<button id="visibilityBtn" class="btn">Ausblenden</button>
        </div>

        <div class="mobile-canvas-toolbar">
  <button id="mobileUndoBtn" class="icon-btn">↶</button>
  <button id="mobileRedoBtn" class="icon-btn">↷</button>
  <button id="mobileDuplicateBtn" class="icon-btn">⧉</button>
  <button id="mobileDeleteBtn" class="icon-btn">⌫</button>
  <button id="mobileMoreToolsBtn" class="btn">Mehr</button>
</div>

        <div class="canvas-wrapper">
          <svg id="canvas" viewBox="0 0 1000 700">
            <rect id="background" width="1000" height="700" fill="#292929" />

            <defs>
              <pattern id="gridPattern" width="15" height="15" patternUnits="userSpaceOnUse">
                <path d="M 15 0 L 0 0 0 15"
                      fill="none"
                      stroke="#d8cfaf"
                      stroke-width="1" />
              </pattern>
            </defs>

            <rect id="grid" width="1000" height="700" fill="url(#gridPattern)" opacity="0.1" />
          </svg>
        </div>

        <div class="statusbar">
  <span id="selectedStatus">Ausgewählt: nichts</span>
  <span id="gridStatus">Raster: an</span>
  <span id="snapStatus">Snap: an</span>
</div>
      </section>

      <aside class="properties-panel">
        <div class="sheet-header">
          <span class="sheet-handle"></span>
          <button class="sheet-close" data-close-sheet>×</button>
        </div>
        <div class="panel-header">
          <h2>Eigenschaften</h2>
          <p>Ausgewähltes Objekt bearbeiten</p>
        </div>

        <div class="property-grid">
          <label>
            X
            <input id="posXInput" type="number">
          </label>

          <label>
            Y
            <input id="posYInput" type="number">
          </label>

          <label>
            Größe
            <input id="scaleInput" type="number" step="0.1" min="0.1">
          </label>

          <label>
            Rotation
            <input id="rotationInput" type="number">
          </label>

          <label id="textProperty" class="full">
            Text
            <input id="textInput" type="text">
          </label>
        </div>
        <div class="layers-panel" id="layersPanel">
  <h3>Ebenen</h3>
  <div id="layersList" class="layers-list"></div>
</div>
      </aside>
      <aside class="mobile-export-panel" id="mobileExportPanel">
  <div class="sheet-header">
    <span class="sheet-handle"></span>
    <button class="sheet-close" data-close-sheet>×</button>
  </div>

  <div class="panel-header">
    <h2>Export & Projekt</h2>
    <p>Datei speichern oder exportieren</p>
  </div>

  <div class="mobile-export-actions">
    <button id="mobileSaveProjectBtn" class="btn">Projekt speichern</button>
    <button id="mobileLoadProjectBtn" class="btn">Projekt laden</button>
    <button id="mobileExportSvgBtn" class="btn">SVG exportieren</button>
    <button id="mobileExportPngBtn" class="btn primary">PNG exportieren</button>
  </div>
</aside>

<aside class="mobile-tools-panel" id="mobileToolsPanel">
  <div class="sheet-header">
    <span class="sheet-handle"></span>
    <button class="sheet-close" data-close-sheet>×</button>
  </div>

  <div class="panel-header">
    <h2>Werkzeuge</h2>
    <p>Objekt bearbeiten und Ansicht steuern</p>
  </div>

  <div class="mobile-tools-grid">
    <button id="mobileSmallerBtn" class="btn">− Kleiner</button>
    <button id="mobileBiggerBtn" class="btn">+ Größer</button>
    <button id="mobileRotateLeftBtn" class="btn">↺ Links drehen</button>
    <button id="mobileRotateRightBtn" class="btn">↻ Rechts drehen</button>
    <button id="mobileFrontBtn" class="btn">Nach vorne</button>
    <button id="mobileBackBtn" class="btn">Nach hinten</button>
    <button id="mobileLockBtn" class="btn">Sperren</button>
    <button id="mobileVisibilityBtn" class="btn">Ausblenden</button>
    <button id="mobileGridBtn" class="btn">Raster</button>
    <button id="mobileSnapBtn" class="btn">Snap</button>
  </div>
</aside>

    </main>

    <nav class="mobile-dock">
  <button id="mobileAssetsBtn">Objekte</button>
  <button id="mobilePropertiesBtn">Eigenschaften</button>
  <button id="mobileLayersBtn">Ebenen</button>
  <button id="mobileExportBtn">Export</button>
</nav>

<div id="mobileOverlay" class="mobile-overlay"></div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
